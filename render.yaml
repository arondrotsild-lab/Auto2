services:
  - type: web
    name: btdetailing-web
    runtime: node
    buildCommand: pnpm install && pnpm --filter @workspace/detailinga run build && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TELEGRAM_CHAT_ID
        value: 302122737
      - key: TELEGRAM_BOT_TOKEN
        sync: false
