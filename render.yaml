services:
  - type: web
    name: btdetailing
    runtime: static
    buildCommand: pnpm install && pnpm --filter @workspace/detailinga run build
    staticPublishPath: ./artifacts/detailinga/dist/public
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
